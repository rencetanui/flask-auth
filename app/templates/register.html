{% extends "base.html" %}

{% block body %}
<div class="container">
  <div class="card">

    <div class="card-header">
      <h1>Register</h1>
      <p class="small">Create a new account to get started.</p>
    </div>

    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form class="form" action="{{ url_for('register') }}" method="post" autocomplete="on">
      <div>
        <div class="label">Username</div>
        <input class="input-field" type="text" placeholder="Enter your username" name="username" required autofocus>
      </div>

      <div>
        <div class="label">Password</div>
        <input class="input-field" type="password" placeholder="Enter your password" id="password" name="password" required>
      </div>

      <div>
        <div class="label">Confirm Password</div>
        <input class="input-field" type="password" placeholder="Confirm your password" id="confirm_password" name="confirm_password" required>
      </div>

      <button class="btn btn_login" type="submit">Register</button>

      <div class="footer">
        <p class="small">
          Already have an account?
          <a class="link" href="{{ url_for('login') }}">Login here</a>
        </p>
      </div>
    </form>

  </div>
</div>
{% endblock %}
