{% extends "base.html" %}

{% block body %}
<div class="container">
  <div class="card">

    <div class="card-header">
      <h1>Welcome</h1>
      <p class="small">Sign in to your account.</p>
    </div>

    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form id="auth-form" class="form" method="POST" autocomplete="on">
      <div>
        <div class="label">Username</div>
        <input type="text" name="username" placeholder="Enter your username" class="input-field" required autofocus>
      </div>

      <div>
        <div class="label">Password</div>
        <input type="password" name="password" placeholder="Enter your password" class="input-field" required>
      </div>

      <button id="loginBtn" type="button" class="btn btn_login" onclick="submitAuth()">
        Login
      </button>

      <!-- Google login should be a GET redirect -->
      <a id="googleBtn" class="btn btn_google" href="{{ url_for('auth.login_with_google') }}">
        Login with Google
      </a>

      <div class="footer">
        <p class="small">
          Don't have an account?
          <a class="link" href="{{ url_for('auth.register') }}">Create one</a>
        </p>
      </div>
    </form>

  </div>
</div>

<form class="form" action="{{ url_for('auth.login') }}" method="POST">
  ...
  <button class="btn btn_login" type="submit">Login</button>
</form>
{% endblock %}
