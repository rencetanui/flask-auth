<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />

  <title>Task Manager</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
  <header class="app-header">
    <div class="header-left">
      <a
        href="{% if session.get('user_id') %}{{ url_for('tasks.dashboard') }}{% else %}{{ url_for('tasks.home') }}{% endif %}"
        class="logo"
      >
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Lolo">
      </a>
    </div>

    <div class="header-center">
      <span class="app-title">Task Manager</span>
    </div>

    <div class="header-right">
      {% if session.get('user_id') %}
        <span class="header-user">{{ session.get('username') }}</span>
      {% endif %}
      
      {% if  session.get('user_id') %}
      <button class="btn btn_small btn_ghost" id="themeToggle" type="button">
        Theme
      </button>
      {% endif %}
      
    </div>
  </header>

  {% block body %}{% endblock %}

  <script>
    (function () {
      const saved = localStorage.getItem("theme");
      if (saved === "dark") document.body.setAttribute("data-theme", "dark");

      const btn = document.getElementById("themeToggle");
      if (!btn) return;

      btn.addEventListener("click", function () {
        const isDark = document.body.getAttribute("data-theme") === "dark";
        if (isDark) {
          document.body.removeAttribute("data-theme");
          localStorage.setItem("theme", "light");
        } else {
          document.body.setAttribute("data-theme", "dark");
          localStorage.setItem("theme", "dark");
        }
      });
    })();
  </script>
</body>
</html>
